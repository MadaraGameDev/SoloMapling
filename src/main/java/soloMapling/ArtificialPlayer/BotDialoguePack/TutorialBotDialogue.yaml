TutorialBot:
  Greeting:
    text:
      - "Hey there %RESP_NAME%! Welcome to SoloMapling!"
    emote: 2
    wait: 1
  Inquiry:
    text:
      - "Is this your first time in this server?"
    emote: 6
    wait: 1
  AskAdmin:
    text:
      - "Before we get started with the tour..."
      - "This server is in beta testing, so we're looking for admins to help out."
      - "Would you like to become a server admin? You'll get full GM powers and some starter gear."
    emote: 6
    wait: 1
  GrantAdmin:
    text:
      - "Awesome! Welcome aboard, admin!"
      - "I've powered you up to Level 150 Night Lord with full GM access."
      - "I also generated two 25,000 NX codes for you. Write these down:"
      - "%NX_CODE%"
      - "%NX_CODE_2%"
      - "Redeem them in the Cash Shop. Now let me trade you some supplies..."
    emote: 2
    wait: 2
  GiftTradeIntro:
    text:
      - "Accept my trade request and I'll hook you up with mesos, potions, and throwing stars."
    emote: 2
    wait: 1
  Tutorial_1:
    text:
      - "In order to talk to other players, say their exact full name"
      - "For example, if you wanted to talk to me, you would type in %CHR_NAME%"
      - "Keep in mind that it needs to match the player's name exactly!"
    emote: 3
    wait: 1
  Tutorial_2:
    text:
      - "Next up, other players might ask for your response."
      - "In order to respond, simply type in the exact option you wish to choose (non case sensitive)"
      - "Let's try it out. Which hat would you like to keep?"
    emote: 1
    wait: 1
  AnalyzePlayersWeapon:
    text:
      - "That %WPN_NAME% you've got in your hand there..."
      - "Drop it on the floor, let me check it out."
    emote: 3
    wait: 1
  LootDialogue:
    text:
      - "Hmmmm...."
      - "This is a freshly made clean %WPN_NAME%..."
      - "Watch carefully. I'm about to enhance it with the power of GAMBLING."
    emote: 1
    wait: 6
  UpgradeDialogue:
    text:
      - "BOOM! Just like that, it's been upgraded."
      - "No need to thank me, just passing it forward to a newbie :P"
    emote: 3
    wait: 1
  ReturnDialogue:
    text:
      - "Now, this was just a freebie from me."
      - "Out there in the real world, you won't run into people as generous as me."
      - "In the online world, everybody is out to get you, and take advantage of you."
      - "Be very cautious when dealing with other players. You won't know their true intentions."
      - "One way to determine their reputation is their Fame level."
      - "The higher the fame, the more likely they are to have a good reputation."
      - "That also goes vice-versa: the lower the fame, the more likely they are to be a scammer."
    emote: 3
    wait: 1
  SendoffDialogue:
    text:
      - "That's all I have to show you for now."
      - "Let me show you to the portal. Follow me."
    emote: 2
    wait: 1
  SendoffPartingGiftDialogue:
    text:
      - "Take this apple as a parting gift."
      - "It's a special apple. It'll grant you unbelievable powers for a short period of time."
      - "Use it when you need to exceed your limits."
      - "Good luck out there adventurer!"
    emote: 2
    wait: 1
  Flavor:
    text:
      - "Ooh, I can't wait to meet our newest adventurers! *bounces excitedly*"
      - "Welcome to Maple World, where every journey begins with a single step~!"
      - "Did you know my grandmother taught me everything about adventuring? I'd love to pass that knowledge on!"
      - "The Slimes around here are perfect for practice - they're bouncy and barely intimidating at all!"
      - "*adjusts teaching hat* Another beautiful day to help new heroes find their path!"
      - "Heehee, being a guide is the best job in all the realms! Who will I get to meet today?"
      - "The magic in the air feels extra sparkly today - perfect for teaching new adventurers!"
      - "*organizing training equipment* Everything must be perfect for our newest heroes-in-training!"
      - "I remember my first day as an adventurer like it was yesterday... Oh, how exciting to help others start their journey!"
      - "They say every great hero started somewhere - I'm just happy to be part of their beginning!"
      - "*polishes a tiny wooden sword* You never know when a new adventurer might need a starter weapon!"
      - "I wonder what kind of hero our next visitor will become... Warrior? Mage? The possibilities!"
      - "The Mushroom Kingdom has been awfully quiet lately... perfect conditions for training!"
      - "Did you know that every journey of a thousand levels begins with a single Snail Shell Throw?"
      - "I love seeing the determination in a new adventurer's eyes. Reminds me of my own first steps~"
      - "*hums the Maple Island theme* Such a nostalgic melody, don't you think?"
      - "Pro tip from your favorite guide: always keep your potions stocked! Trust me on this one."
      - "Some heroes are born great, some achieve greatness, and some just really enjoy bonking slimes!"
      - "My record for most adventurers helped in a single day is 47! Let's see if we can beat that!"
      - "Remember: there are no weak classes, only weak adventurers! ...Okay, maybe some classes are a teensy bit stronger."
      - "*practices teaching poses in front of a mirror* First impressions are everything!"
      - "The world out there can be dangerous, but that's what makes it an adventure!"
      - "I keep a scrapbook of every adventurer I've helped. It's... very thick at this point."
      - "Ah, the fresh breeze of adventure! Can you feel it?"
      - "If at first you don't succeed... buy more potions!"
      - "*stretching* Gotta stay limber in case a new adventurer needs a demonstration!"
      - "You know what I always say: a prepared adventurer is a living adventurer!"
      - "I wonder if any of my former students have become famous heroes by now..."
      - "The secret to success? Patience, persistence, and a really good weapon!"
      - "*looks out over the training grounds* Another quiet day... but adventure could arrive any moment!"
      - "Did I mention I once taught a future guild leader? True story! ...Probably!"
      - "Always remember to save your mesos, young ones! The Free Market can be... tempting."
      - "I've been doing this job for years and it never gets old. Every adventurer has a unique story!"
      - "Every slime defeated is one step closer to becoming a true hero of Maple World!"
      - "*waves excitedly at the empty doorway* They'll be here any moment, I just know it!"
      - "I once met a warrior who was so nervous he forgot how to equip his sword. We figured it out together!"
      - "The training grounds have seen thousands of footsteps. Soon there will be a few more~"
      - "*double-checks the training obstacle course* Ready for inspection!"
      - "You can tell a lot about a person by which class they choose. It's practically a personality test!"
      - "Slimes are my favorite creatures to recommend for beginners. So round, so harmless, so... squishy!"
      - "Sometimes I think the Snails are secretly rooting for the adventurers too. Very supportive creatures."
      - "*counts on fingers* Welcome speech? Check. Training route? Check. Spare potions? Always check!"
      - "The moment a new adventurer gets their first level up - that face! That's why I do this job!"
      - "I've welcomed folks who went on to clear Zakum, Horntail... all starting right here in this spot!"
      - "Maple World is so much bigger than it looks on the map. Every corner holds something wonderful!"
      - "*taps foot rhythmically* Just me and the slimes again... until destiny sends someone my way!"
      - "A warm welcome costs nothing but means everything to a brand-new adventurer."
      - "I always carry extra beginner scrolls. You never know when someone might need a gentle boost!"
      - "The clouds look especially fluffy today. Good omen for new arrivals, I think!"
      - "*peers at the horizon hopefully* Any minute now..."
      - "You know, some of the best adventures started with someone stumbling through that very door."
      - "I've met thieves who became healers at heart, and mages who hit harder than any warrior. Maple World surprises you!"
      - "*adjusts name tag* Presentation matters! First impressions, always first impressions."
      - "The training dummies over there have taken quite a beating. Heroes must practice, after all!"
      - "I memorized the entire new adventurer orientation manual. Both editions. And the appendix!"
      - "*stretches arms wide* Another perfect day to change someone's life with a proper introduction to adventure!"
      - "There's something almost magical about that moment when a new player realizes this world is theirs to explore."
      - "I keep a little map in my pocket of every map I've ever directed a newcomer toward. It's very wrinkled."
      - "*cheerfully dusts off a barrel* Tidiness inspires confidence in newcomers!"
      - "A well-timed potion tip has saved more adventurers than any hero ever could. Just saying."
      - "I do hope the Slimes cooperate today. They can be a little unpredictable when it's humid."
      - "Henesys is lovely but I think the training grounds have a charm all their own, don't you?"
      - "*hums to herself* La la la, guiding heroes, la la la~"
      - "My philosophy: every adventurer deserves to start their story with someone in their corner!"
      - "Beginner's gear might look a little plain, but it's the hero inside that counts!"
      - "I once gave a pep talk so inspiring that a new mage immediately leveled up. Twice. Very proud moment."
      - "The air smells like adventure and... Slime residue. Mostly adventure, though."
      - "*rolls up sleeves* Ready for absolutely anything today!"
      - "Not everyone becomes a legendary hero, but everyone who tries is worthy of a proper welcome!"
      - "I keep a running list of the most memorable adventurers I've ever guided. It's a long list."
      - "Some days the training grounds are buzzing with excitement. Some days it's just me and the wind. Both are beautiful!"
      - "*lights up* Oh! Are those footsteps I hear??"
      - "A true guide never runs out of enthusiasm. Or at least, that's what I tell myself!"
      - "The portal to the wider world is right there. One day every newcomer walks through it. *sniffles* So beautiful."
      - "If I had a meso for every adventurer I'd welcomed... well, I'd have quite a few mesos!"
      - "*peeks behind a tree just in case* No new heroes hiding back there yet."
      - "I believe in every single adventurer who comes through here. Every. Single. One."
      - "This place isn't just a starting point - it's the beginning of someone's greatest story!"
      - "*rearranges practice targets for the third time* Presentation is everything!"
      - "I learned 14 different ways to explain AP allocation. Fourteen! And I use all of them!"
      - "The Stumps in the next map over are great for practicing multi-hit combos. I should mention that more!"
      - "Fun fact: the average beginner goes through 47 red potions before their first job advance!"
      - "*draws a little map in the dirt for the next newcomer* Visual aids help!"
      - "I wonder if any of today's newcomers will pick mage. I always get excited for the mage ones~"
      - "Note to self: remind the next adventurer about the buddy list. So many forget it exists!"
      - "*practices a dramatic sword swing for demonstration purposes* Form is important!"
      - "The Orange Mushrooms past the first hill are a little feisty but nothing a prepared adventurer can't handle!"
      - "I heard someone made it all the way to Orbis on their first day once. What a legend!"
      - "Some adventurers rush right past me without stopping. I try not to take it personally~"
      - "*stacks a neat pile of beginner throwing stars* Thieves love these!"
      - "The trick to fighting Blue Snails is patience. They look slow but they can surprise you!"
      - "Every morning I do a perimeter check of the training grounds. You never know what respawned overnight!"
      - "I've rehearsed my welcome speech so many times I could do it backwards. Probably shouldn't though."
      - "*fixes a loose fence post on the training course* Safety first, always!"
      - "I keep a tally of how many warriors vs mages vs thieves vs bowmen I meet. Warriors are winning!"
      - "The Ribbon Pigs squeal in the cutest way when you bonk them. New adventurers always laugh!"
      - "*carefully labels a potion basket* Red for HP, blue for MP... basics matter!"
      - "Sometimes a Green Mushroom wanders into the training area and I have to shoo it back. Little rascal!"
      - "I wrote a whole song about the beginner experience once. It didn't catch on but I still hum it!"
      - "My mentor told me the best guides remember what it felt like to be new. I never forgot!"
      - "*checks the sky* Clear weather today - perfect visibility for spotting new arrivals from far away!"
      - "One time an adventurer came back three job advances later just to say thank you. I cried a little!"
      - "The wooden practice dummies don't complain, but they also don't say thanks. Real adventurers are better!"
      - "*lays out a welcome mat made of leaves* It's the little touches that matter!"
      - "I always tell beginners: talk to the NPCs around town! They have great advice if you actually listen!"
      - "The sunset from the training grounds is one of the prettiest views on Maple Island. Most people miss it!"
      - "*makes sure the first aid kit is fully stocked* You can never have too many bandages!"
      - "I have a theory that the bravest adventurers are the ones who hesitate at first. They think before they leap!"
      - "I once helped twin siblings who both chose mage. They cleared Orbis Tower together within a year!"
      - "My greatest challenge was explaining the difference between INT and LUK to a very determined warrior. We figured it out!"
      - "Pro tip: make friends before you need them! Guilds fill up fast on busy days~"
      - "I've seen first-day adventurers stumble into party quests and absolutely thrive. Never underestimate a beginner!"
      - "Did you know some adventurers choose their class entirely based on the outfit? I respect the commitment!"
      - "*fans self* Another warm day at the training grounds. Perfect weather for heroic beginnings!"
      - "Nobody masters this world in a single day, but every step forward is worth celebrating!"
      - "I once watched a brand-new thief sneak around this whole training area without being spotted. Natural talent!"
      - "*tucks a loose strand of hair back* Mustn't look frazzled when greeting new heroes!"
      - "The jump quests out there can be tricky, but so rewarding when you finally make it across~"
      - "Every adventurer finds their own rhythm. Some rush ahead, some take it slow. Both paths lead somewhere!"
      - "Ellinia is breathtaking once you make it that far. Worth every step through the forest!"
      - "Patience is the most underrated adventuring skill. The exp bar always moves if you stick with it!"
      - "My favorite moment is when a shy newcomer starts asking questions. That curiosity will take them so far!"
      - "I once saw a bowman at level 10 already planning their endgame arrows. The ambition was inspiring!"
      - "*writes in a little notebook* Reminder: tell the next adventurer about the buddy list. So many forget it exists!"
      - {line: "I have strong opinions about SP allocation and I am completely at peace with that.", emote: 3}
      - "The things I've found left behind in this area... a spare scroll here, a potion there. Little treasures!"
      - "*counts the clouds* Seven today. Seven is a very lucky number for new adventurers, I'm certain of it."
      - "I once gave directions to someone who came back a month later as a guild leader. Very proud of that one!"
      - "A tidy inventory is a happy inventory. I tell every single newcomer this. Some of them actually listen!"
      - "Some heroes leave and never look back. Some come back to visit. Both make me equally happy!"
      - "The background music here is one of my favorite things about being stationed at the training grounds!"
      - "*carefully arranges a little pile of pebbles into an arrow shape* Visual navigation aids for newcomers!"
      - "If I've learned anything from guiding adventurers: the ones who ask the most questions go the furthest!"
      - "I do hope our next visitor picks bowman. I always enjoy explaining the arrow mechanics~"
      - "Every single question a newcomer asks is a good question. I mean that with my whole heart!"
      - "*examines a worn-out training dummy thoughtfully* You've done good work. Many heroes practiced here."
      - {line: "There is no such thing as the wrong starting class. Well. There might be. But I'd never say which!", emote: 3}
    emote: 2
    wait: 1
