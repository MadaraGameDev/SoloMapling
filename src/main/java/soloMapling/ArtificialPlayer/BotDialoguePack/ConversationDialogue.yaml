      - {speaker: D, text: "yeah ludi is clearly superior. orbis is just a boat stop", emote: 1}
      - {speaker: A, text: "a boat stop?? orbis has the garden and the cloud park!"}
      - {speaker: B, text: "and the orbis PQ is underrated"}
      - {speaker: C, text: "we'll agree to disagree I guess"}
      - {speaker: D, text: "ludi wins tho", emote: 3}

  guild_meeting:
    participants: 4
    lines:
      - {speaker: A, text: "ok guild meeting time. first order of business"}
      - {speaker: B, text: "can we talk about the zakum schedule"}
      - {speaker: A, text: "yes. were doing runs every saturday 8pm est. everyone needs to be there"}
      - {speaker: C, text: "what if we cant make saturday?"}
      - {speaker: A, text: "then we do a makeup run on sunday"}
      - {speaker: D, text: "sounds fair to me"}
      - {speaker: B, text: "also can we get a guild banner"}
      - {speaker: A, text: "ill look into it. meeting adjourned lol", emote: 0}

  roast_session:
    participants: 4
    lines:
      - {speaker: A, text: "nice cape bro"}
      - {speaker: B, text: "thanks!", emote: 2}
      - {speaker: A, text: "I was being sarcastic", emote: 3}
      - {speaker: C, text: "LMAOOO", emote: 2}
      - {speaker: B, text: "wow ok", emote: 4}
      - {speaker: D, text: "nah for real tho u need an upgrade my guy"}
      - {speaker: B, text: "I hate all of you"}
      - {speaker: C, text: "love u too <3", emote: 0}

  maple_memories:
    participants: 4
    lines:
      - {speaker: A, text: "whens the first time yall played maple"}
      - {speaker: B, text: "2006. my friend showed me in the school library"}
      - {speaker: C, text: "2005 for me. beta days", emote: 3}
      - {speaker: D, text: "2008 but ive been hooked ever since"}
      - {speaker: A, text: "same 2007. I remember making my first character and being so confused"}
      - {speaker: B, text: "bro maple island tutorial had me lost for an hour", emote: 2}
      - {speaker: C, text: "the good old days"}
      - {speaker: D, text: "for real. this game is timeless", emote: 0}

