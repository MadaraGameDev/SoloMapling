      - {speaker: A, text: "did people actually show up?"}
      - {speaker: B, text: "like 20 people. someone even brought gifts lol", emote: 2}
      - {speaker: A, text: "thats adorable. this game is wild"}
      - {speaker: B, text: "yeah where else can u attend a virtual wedding at 2am on a tuesday"}

  zakum_prequest_pain:
    participants: 2
    lines:
      - {speaker: A, text: "bro the zakum prequest is killing me"}
      - {speaker: B, text: "which part?"}
