      - {speaker: B, text: "nah ellinia is way cooler. the music and the trees"}
      - {speaker: C, text: "kerning city has the best vibes tho. the dark alley aesthetic"}
      - {speaker: A, text: "bro kerning is literally a dump lol", emote: 2}
      - {speaker: B, text: "hes right. kerning smells"}
      - {speaker: C, text: "yall just dont appreciate it", emote: 1}

  guild_drama:
    participants: 3
    lines:
      - {speaker: A, text: "bro our guild leader hasnt logged in for 2 weeks"}
      - {speaker: B, text: "again?? didnt this happen last month too"}
      - {speaker: C, text: "at this point we should just make our own guild"}
