  #  3-PERSON CONVERSATIONS
  # ═══════════════════════════════════════

  pq_planning:
    participants: 3
    lines:
      - {speaker: A, text: "anyone wanna do OPQ?"}
      - {speaker: B, text: "im down. whats ur level?"}
      - {speaker: A, text: "58 bishop"}
      - {speaker: C, text: "im in too. 55 hermit"}
      - {speaker: B, text: "perfect. lets find 3 more"}
      - {speaker: A, text: "meet at orbis ch 2"}
      - {speaker: C, text: "omw"}

  pq_planning_2:
    participants: 3
    lines:
      - {speaker: A, text: "J> KPQ need 2"}
      - {speaker: B, text: "what level r u"}
      - {speaker: A, text: "25 assassin"}
      - {speaker: C, text: "ill come. 28 cleric"}
      - {speaker: B, text: "ok me too. meet at kerning"}
      - {speaker: A, text: "lets goo", emote: 2}

  best_town_debate:
