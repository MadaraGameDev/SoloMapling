    lines:
      - {speaker: A, text: "YOOO I just got a chaos scroll from gach", emote: 2}
      - {speaker: B, text: "NO WAY", emote: 5}
      - {speaker: C, text: "proof or it didnt happen"}
      - {speaker: A, text: "its literally in my inventory look"}
      - {speaker: B, text: "bro sell that for like 100m+"}
      - {speaker: C, text: "or use it and pray", emote: 3}
      - {speaker: A, text: "im gonna use it. yolo"}
      - {speaker: B, text: "ur insane", emote: 5}

  boss_fight_recap:
    participants: 3
    lines:
      - {speaker: A, text: "that zakum run was INTENSE"}
      - {speaker: B, text: "bruh I almost died like 3 times", emote: 7}
      - {speaker: C, text: "I did die. twice. lol", emote: 4}
      - {speaker: A, text: "at least we got the helm drop"}
      - {speaker: B, text: "who got it?"}
      - {speaker: A, text: "I did lol", emote: 3}
      - {speaker: C, text: "bruh"}

  whos_strongest:
    participants: 3
    lines:
      - {speaker: A, text: "alright whos the strongest here"}
      - {speaker: B, text: "me obviously", emote: 3}
      - {speaker: C, text: "ur literally level 60 calm down", emote: 2}
      - {speaker: B, text: "level doesnt mean everything ok"}
      - {speaker: A, text: "it kinda does tho"}
      - {speaker: C, text: "LOL"}

  late_night_group:
    participants: 3
    lines:
      - {speaker: A, text: "why are we all online at 4am"}
      - {speaker: B, text: "because we have no self control"}
      - {speaker: C, text: "I literally have work at 7", emote: 7}
      - {speaker: A, text: "go to sleep then??"}
      - {speaker: C, text: "one more run"}
      - {speaker: B, text: "thats the spirit", emote: 2}

  training_recommendations:
    participants: 3
    lines:
      - {speaker: A, text: "hey im lvl 35 where should I train"}
      - {speaker: B, text: "zombie mushrooms are good"}
      - {speaker: C, text: "nah go to CPQ way faster"}
      - {speaker: B, text: "CPQ is only good if u have a party tho"}
      - {speaker: A, text: "I dont have a party lol"}
      - {speaker: C, text: "ill come. lets go"}
      - {speaker: A, text: "lets gooo", emote: 2}

  real_life_group:
    participants: 3
    lines:
      - {speaker: A, text: "what country are yall from"}
      - {speaker: B, text: "US. california"}
      - {speaker: C, text: "canada"}
      - {speaker: A, text: "im from brazil!"}
      - {speaker: B, text: "thats sick. maple really is global huh", emote: 2}
      - {speaker: C, text: "love that"}

  two_argue_third_mediates:
    participants: 3
    lines:
      - {speaker: A, text: "warriors are literally useless in boss fights"}
      - {speaker: B, text: "EXCUSE ME? who tanks for u then", emote: 6}
      - {speaker: A, text: "anyone can tank if they pot fast enough"}
      - {speaker: C, text: "ok guys chill. every class has a role"}
      - {speaker: B, text: "thank you. at least someone has sense"}
      - {speaker: A, text: "fine whatever. warriors are ok I guess"}
      - {speaker: C, text: "there we go", emote: 0}

  halloween_event:
    participants: 3
    lines:
      - {speaker: A, text: "are u guys doing the halloween event?"}
      - {speaker: B, text: "yeah the rewards are actually good this time"}
      - {speaker: C, text: "whats the reward?"}
      - {speaker: A, text: "theres a cape and some chairs"}
      - {speaker: B, text: "the cape has decent stats too"}
      - {speaker: C, text: "ok im in. where do I start the quest"}
      - {speaker: A, text: "talk to the NPC in henesys park"}

  # ═══════════════════════════════════════
  #  4-PERSON CONVERSATIONS
  # ═══════════════════════════════════════

  party_formation:
    participants: 4
    lines:
      - {speaker: A, text: "ok whos all coming to OPQ"}
      - {speaker: B, text: "me. 57 priest"}
      - {speaker: C, text: "im in. 54 ranger"}
      - {speaker: D, text: "62 hermit right here"}
      - {speaker: A, text: "perfect. we need like 2 more warriors if possible"}
      - {speaker: B, text: "ill ask my friend hes a DK"}
      - {speaker: D, text: "lets get it", emote: 2}

  group_reaction:
    participants: 4
    lines:
      - {speaker: A, text: "DID YALL JUST SEE THAT", emote: 5}
      - {speaker: B, text: "WHAT"}
      - {speaker: C, text: "see what?"}
      - {speaker: A, text: "someone just dropped a white scroll on the ground"}
      - {speaker: D, text: "LMAO who does that", emote: 2}
      - {speaker: B, text: "was it an accident??"}
      - {speaker: C, text: "probably a flex. or an accident lol"}
      - {speaker: A, text: "either way my heart stopped for a second"}

  debate_2v2:
    participants: 4
    lines:
      - {speaker: A, text: "orbis is better than ludi fight me"}
      - {speaker: B, text: "agree. orbis has way better music"}
