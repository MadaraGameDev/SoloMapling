conversations:

  # ═══════════════════════════════════════
  #  2-PERSON CONVERSATIONS
  # ═══════════════════════════════════════

  training_spot_debate:
    participants: 2
    lines:
      - {speaker: A, text: "where do u train?"}
      - {speaker: B, text: "pig beach mostly"}
      - {speaker: A, text: "isnt that kinda slow?", emote: 5}
      - {speaker: B, text: "yeah but its chill, no one bothers me"}
      - {speaker: A, text: "fair enough lol"}

  training_spot_debate_2:
    participants: 2
    lines:
      - {speaker: A, text: "where should I train at lvl 45?"}
      - {speaker: B, text: "mp3 or gobies"}
      - {speaker: A, text: "which is faster"}
      - {speaker: B, text: "gobies if u have a pet, mp3 if not"}
      - {speaker: A, text: "ok ty!", emote: 2}

  class_debate:
    participants: 2
    lines:
      - {speaker: A, text: "whats the best class in the game"}
      - {speaker: B, text: "night lord obviously", emote: 3}
      - {speaker: A, text: "lol no way. bishops are way more useful"}
      - {speaker: B, text: "useful sure but NL does the most damage"}
      - {speaker: A, text: "whatever bro", emote: 1}
      - {speaker: B, text: "stay mad lol", emote: 3}

  class_debate_2:
    participants: 2
    lines:
      - {speaker: A, text: "should I make a warrior or a mage"}
      - {speaker: B, text: "depends what u want. warriors are tanky, mages do big aoe"}
      - {speaker: A, text: "I want to look cool"}
      - {speaker: B, text: "then make a dark knight lol", emote: 2}
      - {speaker: A, text: "bet"}

  item_price_haggle:
    participants: 2
    lines:
      - {speaker: A, text: "how much for those ilbis?"}
      - {speaker: B, text: "4.5m per set"}
      - {speaker: A, text: "thats kinda expensive... 3.5?"}
      - {speaker: B, text: "nah lowest I go is 4m"}
      - {speaker: A, text: "deal", emote: 2}
      - {speaker: B, text: "trade me"}

  item_price_haggle_2:
    participants: 2
    lines:
      - {speaker: A, text: "S> 10% glove att"}
      - {speaker: B, text: "how much"}
      - {speaker: A, text: "60m"}
      - {speaker: B, text: "LOL no thx", emote: 4}
      - {speaker: A, text: "ok 50m final offer"}
      - {speaker: B, text: "nty gl selling tho"}

  quest_help:
    participants: 2
    lines:
      - {speaker: A, text: "do u know where the mushroom shrine is?"}
      - {speaker: B, text: "yeah take the boat from orbis"}
      - {speaker: A, text: "theres a boat??", emote: 5}
      - {speaker: B, text: "lol yeah at the top of orbis tower. theres a ticket booth"}
      - {speaker: A, text: "ohhh ok tyty", emote: 2}

  quest_help_2:
    participants: 2
    lines:
      - {speaker: A, text: "anyone know how to get to el nath?"}
      - {speaker: B, text: "go to orbis and go down the tower"}
      - {speaker: A, text: "the entire tower?? how long is that"}
      - {speaker: B, text: "like 20 floors lol"}
      - {speaker: A, text: "bruh", emote: 7}

  real_life_school:
    participants: 2
    lines:
      - {speaker: A, text: "ugh I have a test tomorrow"}
      - {speaker: B, text: "same actually. math?"}
      - {speaker: A, text: "yep. havent studied at all", emote: 7}
      - {speaker: B, text: "lol same. we'll be fine"}
      - {speaker: A, text: "wishful thinking lol"}

  real_life_food:
    participants: 2
    lines:
      - {speaker: A, text: "what did u eat for dinner"}
      - {speaker: B, text: "instant ramen lol"}
      - {speaker: A, text: "classic gamer fuel", emote: 2}
      - {speaker: B, text: "its not by choice trust me", emote: 4}

  real_life_late_night:
    participants: 2
    lines:
      - {speaker: A, text: "bro its 3am"}
      - {speaker: B, text: "and?"}
      - {speaker: A, text: "dont u have school tmr"}
      - {speaker: B, text: "yeah but one more run"}
      - {speaker: A, text: "thats what u said an hour ago lol", emote: 2}

  real_life_weather:
    participants: 2
    lines:
      - {speaker: A, text: "its literally raining so hard outside"}
      - {speaker: B, text: "perfect weather to stay inside and play maple", emote: 0}
      - {speaker: A, text: "trueeee"}

  nostalgia_old_maple:
    participants: 2
    lines:
      - {speaker: A, text: "dude remember when henesys hunting ground was packed"}
      - {speaker: B, text: "yesss and everyone was fighting over channels", emote: 2}
      - {speaker: A, text: "and then someone would KS you and u would defame them"}
      - {speaker: B, text: "LMAO the fame wars. classic maple"}
      - {speaker: A, text: "those were the days man", emote: 4}

  nostalgia_maple_island:
    participants: 2
    lines:
      - {speaker: A, text: "do u remember maple island"}
      - {speaker: B, text: "bro of course. the snails"}
      - {speaker: A, text: "I remember dying to blue snails because I didnt know how to use pots", emote: 7}
      - {speaker: B, text: "LMAO thats actually tragic", emote: 2}
      - {speaker: A, text: "we were all noobs once"}

  flex_compare:
    participants: 2
    lines:
      - {speaker: A, text: "check out my new weapon", emote: 3}
      - {speaker: B, text: "not bad. how much that cost u"}
      - {speaker: A, text: "200m"}
      - {speaker: B, text: "bro I coulda gotten u one for 150", emote: 5}
      - {speaker: A, text: "... dont tell me that", emote: 4}

  flex_level:
    participants: 2
    lines:
      - {speaker: A, text: "just hit 70 today!!", emote: 2}
      - {speaker: B, text: "nice gz!", emote: 2}
      - {speaker: A, text: "3rd job is so much better than 2nd"}
      - {speaker: B, text: "wait till u get to 4th job. its a whole new game"}
      - {speaker: A, text: "cant wait"}

  afk_check:
    participants: 2
    lines:
      - {speaker: A, text: "u there?"}
      - {speaker: B, text: "yeah sorry was afk"}
      - {speaker: A, text: "lol np thought u dc'd"}
      - {speaker: B, text: "nah just grabbed water"}

  scam_warning:
    participants: 2
    lines:
      - {speaker: A, text: "bro some guy just tried to scam me in FM"}
      - {speaker: B, text: "what happened"}
      - {speaker: A, text: "he put up a white scroll then swapped it for a 10% scroll last second"}
      - {speaker: B, text: "classic scam. always double check before u hit trade", emote: 1}
      - {speaker: A, text: "yeah learned that the hard way", emote: 4}

  guild_talk:
    participants: 2
    lines:
      - {speaker: A, text: "are u in a guild?"}
      - {speaker: B, text: "yeah Resilience. its pretty active"}
      - {speaker: A, text: "are they recruiting? been looking for one"}
      - {speaker: B, text: "yeah whisper the leader. tell him I sent you"}
      - {speaker: A, text: "bet thanks!", emote: 2}

  boss_planning:
    participants: 2
    lines:
      - {speaker: A, text: "u wanna do zakum tonight?"}
      - {speaker: B, text: "what time"}
      - {speaker: A, text: "like 8pm est? need a bishop tho"}
      - {speaker: B, text: "I can ask my guildie. hes a 13x bishop"}
      - {speaker: A, text: "perfect lets do it", emote: 2}

  scroll_results:
    participants: 2
    lines:
      - {speaker: A, text: "I just 60%'d my weapon and it failed 5 times in a row", emote: 6}
      - {speaker: B, text: "bro 60% scrolls are a lie. they feel like 30%"}
      - {speaker: A, text: "literally. 200m down the drain"}
      - {speaker: B, text: "F"}

  scroll_results_2:
    participants: 2
    lines:
      - {speaker: A, text: "I JUST WENT 7/7 ON 60% SCROLLS", emote: 2}
      - {speaker: B, text: "NO WAY. prove it", emote: 5}
      - {speaker: A, text: "dead serious. my hands were shaking"}
      - {speaker: B, text: "bro go buy a lottery ticket"}
      - {speaker: A, text: "lmaooo for real"}

  fashion_talk:
    participants: 2
    lines:
      - {speaker: A, text: "yo where did u get that outfit"}
      - {speaker: B, text: "cash shop. just dropped like $10 on NX"}
      - {speaker: A, text: "worth it tho u look fresh", emote: 2}
      - {speaker: B, text: "ty ty. gotta look good in henesys u know", emote: 3}

  money_problems:
    participants: 2
    lines:
      - {speaker: A, text: "im so broke", emote: 4}
      - {speaker: B, text: "how broke"}
      - {speaker: A, text: "like 50k mesos broke"}
      - {speaker: B, text: "bro thats literally nothing LOL", emote: 2}
      - {speaker: A, text: "I know thats the problem", emote: 7}

  pet_talk:
    participants: 2
    lines:
      - {speaker: A, text: "is getting a pet worth it?"}
      - {speaker: B, text: "100%. auto loot changes your life"}
      - {speaker: A, text: "which one should I get"}
      - {speaker: B, text: "doesnt matter they all do the same thing. get the one u think is cute"}
      - {speaker: A, text: "husky it is then", emote: 0}

  maple_gf:
    participants: 2
    lines:
      - {speaker: A, text: "my maple gf just broke up with me", emote: 4}
      - {speaker: B, text: "bro what"}
      - {speaker: A, text: "she said she found someone with a higher level"}
      - {speaker: B, text: "lmaooo thats cold", emote: 2}
      - {speaker: A, text: "pain"}

  random_encounter:
    participants: 2
    lines:
      - {speaker: A, text: "hey"}
      - {speaker: B, text: "hey"}
      - {speaker: A, text: "..."}
      - {speaker: B, text: "..."}
      - {speaker: A, text: "nice weather"}
      - {speaker: B, text: "lol"}

  coming_back:
    participants: 2
    lines:
      - {speaker: A, text: "just came back to maple after like 3 years"}
      - {speaker: B, text: "welcome back! whats your level"}
      - {speaker: A, text: "52. I feel like such a noob again lol"}
      - {speaker: B, text: "nah ull catch up fast. the game is way easier to level now"}
      - {speaker: A, text: "thats good to hear", emote: 0}

  dc_frustration:
    participants: 2
    lines:
      - {speaker: A, text: "I JUST DC'D IN THE MIDDLE OF A BOSS FIGHT", emote: 6}
      - {speaker: B, text: "rip. did u lose ur spot?"}
      - {speaker: A, text: "yeah and all my buffs are gone"}
      - {speaker: B, text: "thats rough. this server has been so laggy lately"}
      - {speaker: A, text: "im tilted beyond belief", emote: 1}

  fame_exchange:
    participants: 2
    lines:
      - {speaker: A, text: "fame for fame?"}
      - {speaker: B, text: "sure"}
      - {speaker: A, text: "ok I famed u"}
      - {speaker: B, text: "gotchu back", emote: 2}
      - {speaker: A, text: "ty!"}

  job_advancement:
    participants: 2
    lines:
      - {speaker: A, text: "Im about to do my 3rd job advancement!!", emote: 2}
      - {speaker: B, text: "nice! which class?"}
      - {speaker: A, text: "going ranger"}
      - {speaker: B, text: "solid choice. strafe hits so hard"}
      - {speaker: A, text: "cant wait to try it out"}

  server_drama:
    participants: 2
    lines:
      - {speaker: A, text: "did u hear about that drama in the FM yesterday"}
      - {speaker: B, text: "no what happened"}
      - {speaker: A, text: "some dude got caught duping and got banned"}
      - {speaker: B, text: "LMAO good. dupers ruin the economy"}
      - {speaker: A, text: "for real"}

