  #  ADDITIONAL 2-PERSON CONVERSATIONS
  # ═══════════════════════════════════════

  scroll_advice:
    participants: 2
    lines:
      - {speaker: A, text: "should I use 60% or 10% scrolls on my weapon?"}
      - {speaker: B, text: "depends. how much mesos u got and how much do u like pain"}
      - {speaker: A, text: "lol like 80m"}
      - {speaker: B, text: "go 60%. 10% is only for when ur rich and hate yourself"}
      - {speaker: A, text: "LMAO ok 60% it is"}
      - {speaker: B, text: "gl dude. say a prayer before each scroll", emote: 2}

  new_player_help:
    participants: 2
    lines:
      - {speaker: A, text: "hey im brand new. how do I get out of this town?"}
