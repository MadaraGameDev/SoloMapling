      - {speaker: A, text: "good bishops are worth their weight in mesos and ppl dont realize it"}
      - {speaker: B, text: "preach. i started one just to understand the struggle"}

  meso_saving_debate:
    participants: 3
    lines:
      - {speaker: A, text: "im trying to save 50m. been holding off buying anything for 2 weeks"}
      - {speaker: B, text: "50m for what"}
      - {speaker: A, text: "i want a zhelm. prices are insane right now"}
      - {speaker: C, text: "just do zakum runs yourself if you can get in a crew"}
      - {speaker: A, text: "im not 140 yet so i cant even go in"}
      - {speaker: B, text: "buying one is faster. just takes patience"}
      - {speaker: C, text: "i spent 3 weeks saving for mine and then the price dropped lol", emote: 6}
      - {speaker: A, text: "thats my nightmare scenario"}
      - {speaker: B, text: "buy when u have the mesos dont wait. prices only go one way"}

  class_switch_temptation:
    participants: 2
    lines:
      - {speaker: A, text: "i keep thinking about rerolling as a shadower"}
      - {speaker: B, text: "ur a warrior arent u. why would u swap"}
      - {speaker: A, text: "shadowers look so cool and the bossing seems way more fun"}
      - {speaker: B, text: "the fund requirements are brutal though. dagger is not cheap"}
      - {speaker: A, text: "i know but im kinda bored with spear knight at this point"}
      - {speaker: B, text: "classic grass is greener situation. shadowers complain too lol"}
      - {speaker: A, text: "what do they complain about"}
      - {speaker: B, text: "funding mostly. and the fact that assassinate sometimes just misses", emote: 3}
      - {speaker: A, text: "ok fine ill stick with spear for now. but i still think about it"}

  free_market_haggling:
    participants: 2
    lines:
      - {speaker: A, text: "ur maple soul shield is 900k but ive seen it for 600k elsewhere"}
      - {speaker: B, text: "those ones probably dont have the same stats check before comparing"}
      - {speaker: A, text: "the stats look the same to me. 11 def is standard right"}
      - {speaker: B, text: "i mean i can do 850k. thats as low as im going"}
      - {speaker: A, text: "ill do 750k. thats a fair price for this map"}
      - {speaker: B, text: "800k and its yours. final offer"}
      - {speaker: A, text: "...fine. 800k. deal", emote: 2}
      - {speaker: B, text: "pleasure doing business. enjoy the shield"}

  skill_build_argument:
    participants: 3
    lines:
      - {speaker: A, text: "u should max booster before lucky seven if ur an assassin"}
      - {speaker: B, text: "no way lucky seven first always. damage matters more early"}
      - {speaker: A, text: "but booster makes everything feel smoother and ur attack speed matters"}
      - {speaker: C, text: "ive done it both ways. lucky seven first is the right call for training speed"}
      - {speaker: B, text: "thank u finally someone agrees"}
      - {speaker: A, text: "ur both wrong and i stand by it", emote: 5}
      - {speaker: C, text: "i mean if u have haste from a mage u can skip booster even longer"}
      - {speaker: B, text: "thats a whole other debate"}
      - {speaker: A, text: "honestly just pick one and stick with it. both work"}

  orbis_pq_memories:
    participants: 2
    lines:
      - {speaker: A, text: "do people still do opq or is it dead now"}
      - {speaker: B, text: "its pretty quiet. used to be packed at the orbis tower"}
      - {speaker: A, text: "those waiting lines were brutal but fun in a weird way"}
      - {speaker: B, text: "i made so many random friends just standing in the entrance lobby"}
      - {speaker: A, text: "the boat trip to orbis was basically social hour too"}
      - {speaker: B, text: "ppl would fight monsters together on the way over and just vibe", emote: 2}
      - {speaker: A, text: "maple genuinely had the best idle moments. just existing was fun"}
      - {speaker: B, text: "opq itself was also pretty fun once u got a good party going"}

  dark_knight_vs_hero:
    participants: 2
    lines:
      - {speaker: A, text: "dark knight or hero for bossing. go"}
      - {speaker: B, text: "hero. beholder is cool but hero just does more in practice"}
      - {speaker: A, text: "dk gets beholder buff and sacrifice though thats huge utility"}
      - {speaker: B, text: "hero gets enrage and combo for burst. pure damage wins long fights"}
      - {speaker: A, text: "dk is tankier which matters on chaos runs"}
      - {speaker: B, text: "fair point. for zakum specifically dk is probably safer"}
      - {speaker: A, text: "i just think beholder looks awesome and that counts for something", emote: 3}
      - {speaker: B, text: "valid reason to pick a class honestly. aesthetics matter"}

  party_buffing_etiquette:
    participants: 3
    lines:
      - {speaker: A, text: "can we please establish that u say bless before casting not after"}
      - {speaker: B, text: "lol what happened"}
      - {speaker: A, text: "bishop buffed over my haste right at the start of the run"}
      - {speaker: C, text: "oof. bless and haste overlap can get messy"}
      - {speaker: B, text: "ideally call order in party chat before the run starts"}
      - {speaker: A, text: "nobody ever does that though. everyone just goes"}
      - {speaker: C, text: "i always do mage buffs first then warrior then priests. works fine"}
      - {speaker: B, text: "that should just be the universal standard honestly", emote: 2}
      - {speaker: A, text: "spread the word. buff order saves lives"}

  late_night_grind:
    participants: 2
    lines:
      - {speaker: A, text: "its 2am and im still grinding at skeles. send help"}
      - {speaker: B, text: "same. im at coolies and i cant stop. just one more level"}
      - {speaker: A, text: "one more level has been my lie for 3 hours now", emote: 14}
      - {speaker: B, text: "the exp bar moves so satisfying at night when the servers are quiet"}
      - {speaker: A, text: "true. feels peaceful in a weird way"}
      - {speaker: B, text: "i gotta be up in like 4 hours lol"}
      - {speaker: A, text: "same but maple time doesnt care about real time"}
      - {speaker: B, text: "alright ok actually logging off for real this time"}
      - {speaker: A, text: "sure u are. see u in 30 minutes probably"}

  quitting_and_returning:
    participants: 2
    lines:
      - {speaker: A, text: "i actually quit for like 8 months and just came back last week"}
      - {speaker: B, text: "welcome back lol. what made u come back"}
      - {speaker: A, text: "honestly just nostalgia hit. i missed the vibe"}
      - {speaker: B, text: "happens to everyone. this game has a gravitational pull"}
      - {speaker: A, text: "surprised how much i remembered about my builds and spots"}
      - {speaker: B, text: "muscle memory never forgets. ur fingers know the combos", emote: 2}
      - {speaker: A, text: "had to relearn some stuff but picked it back up fast"}
      - {speaker: B, text: "thats the thing with maple. it always feels like coming home"}

  fame_farming_discussion:
    participants: 3
    lines:
      - {speaker: A, text: "do people actually care about fame anymore"}
      - {speaker: B, text: "not really but its still nice to see it go up"}
      - {speaker: C, text: "some shops still show fame as a req for entry prices"}
      - {speaker: A, text: "the old fm shops doing fame checks for trading was so weird"}
      - {speaker: B, text: "i had like 200 fame before i realized nobody was checking", emote: 6}
      - {speaker: C, text: "fame farming by pairing with randoms was actually kind of social"}
      - {speaker: A, text: "true. met some cool people through fame runs"}
      - {speaker: B, text: "it was basically a free daily reason to talk to strangers"}

  fm_room_navigation:
    participants: 2
    lines:
      - {speaker: A, text: "why is free market room numbering so confusing"}
      - {speaker: B, text: "ikr. ive been lost in fm for 10 minutes trying to find someone"}
      - {speaker: A, text: "i always forget which portal goes to which room section"}
      - {speaker: B, text: "just spam enter and hope for the best is my strategy", emote: 3}
      - {speaker: A, text: "the map is technically there but it doesnt help at all"}
      - {speaker: B, text: "whoever designed the fm layout had a unique vision"}
      - {speaker: A, text: "i just memorize which shops i need and go straight there"}
      - {speaker: B, text: "once u learn the layout its muscle memory. takes a few weeks tho"}

  boss_prep_checklist:
    participants: 2
    lines:
      - {speaker: A, text: "zakum is in 30 mins. u ready"}
      - {speaker: B, text: "need to buy like 300 more red pots first"}
      - {speaker: A, text: "u need at least a pack of elixirs too. his arms hit hard"}
      - {speaker: B, text: "do i need accuracy gear or is my base acc enough"}
      - {speaker: A, text: "at ur level base should be fine. maybe throw on one acc ring just in case"}
      - {speaker: B, text: "ok grabbing pots now. u have a rez ready"}
      - {speaker: A, text: "bishop friend said yes so we should be covered"}
      - {speaker: B, text: "good. i always die on arm phase at least once lol", emote: 7}
      - {speaker: A, text: "same honestly. just gotta tank through it"}

  alt_character_confession:
    participants: 3
    lines:
      - {speaker: A, text: "i have 4 alt characters and i feel guilty about it"}
      - {speaker: B, text: "why guilty. alts are normal"}
      - {speaker: A, text: "because none of them are past level 60 and i keep starting new ones"}
      - {speaker: C, text: "oh no ur an alt hopper. i know one when i see one", emote: 3}
      - {speaker: A, text: "i just get excited about new classes and then lose interest"}
      - {speaker: B, text: "the first 30 levels of a new character feel so fresh though"}
      - {speaker: C, text: "then u hit the grind wall and go make another new character"}
      - {speaker: A, text: "exactly. its a cycle and i cannot break it"}
      - {speaker: B, text: "at some point one will stick. just gotta find ur class"}

  nx_cosmetic_priorities:
    participants: 2
    lines:
      - {speaker: A, text: "if u had 30k nx what would u spend it on first"}
      - {speaker: B, text: "hair coupon no contest. gotta look good before anything else"}
      - {speaker: A, text: "i was thinking the overall set in the shop is kinda nice"}
      - {speaker: B, text: "the dusk wanderer set? yeah thats clean"}
      - {speaker: A, text: "the hat slot is hard though. clashes with most equip hats"}
      - {speaker: B, text: "thats why cash hat is always top priority. frees up ur fashion"}
      - {speaker: A, text: "valid point. cash hat then the set or just hair?"}
      - {speaker: B, text: "hair first. everything else is secondary to the haircut", emote: 3}

  el_nath_cold_complaints:
    participants: 2
    lines:
      - {speaker: A, text: "why does the cold debuff in el nath still annoy me every single time"}
      - {speaker: B, text: "its the snowflakes on ur screen right. so distracting"}
      - {speaker: A, text: "makes everything feel sluggish and its ugly"}
      - {speaker: B, text: "just grab the antidote from the npc at the bottom before going up"}
      - {speaker: A, text: "i always forget. every time i come here"}
      - {speaker: B, text: "at least the map is pretty when ur not being frozen every 3 seconds"}
      - {speaker: A, text: "the music up here is good though. very atmospheric"}
      - {speaker: B, text: "el nath gets points for vibes. minus points for cold mechanic", emote: 4}

  pq_partner_search:
    participants: 3
    lines:
      - {speaker: A, text: "looking for lpq pt. need 3 more pls"}
      - {speaker: B, text: "what level range u doing"}
      - {speaker: A, text: "anywhere from 35 to 50 works. we have a priest so buffs are covered"}
      - {speaker: C, text: "oooh im 41 can i join"}
      - {speaker: A, text: "yes!! what class"}
      - {speaker: C, text: "ice lightning mage. got thunderbolt ready"}
      - {speaker: B, text: "thats strong for the golem stage. ill come too im a bandit"}
      - {speaker: A, text: "perfect lets go. meet at the entrance portal", emote: 11}

  scroll_success_witness:
    participants: 2
    lines:
      - {speaker: A, text: "yo i just watched someone 70% scroll a work glove 7 times in a row"}
      - {speaker: B, text: "thats insane. what are the odds of that"}
      - {speaker: A, text: "they were losing their mind. literally jumping in fm"}
      - {speaker: B, text: "as they should. 70% scrolling anything 7 times is a miracle"}
      - {speaker: A, text: "they turned a clean wg into a near perfect one. insane to watch"}
      - {speaker: B, text: "that would have cost like 50 mil in dark scrolls to replicate", emote: 12}
      - {speaker: A, text: "exactly. it was a legendary fm moment. ppl were cheering"}
      - {speaker: B, text: "i wish i had been there for that"}

  leveling_speed_comparison:
    participants: 2
    lines:
      - {speaker: A, text: "how long did it take u to hit 120"}
      - {speaker: B, text: "honestly about 3 months of casual playing. maybe 4"}
      - {speaker: A, text: "thats not bad. ive been sitting at 118 for like 3 weeks"}
      - {speaker: B, text: "the wall between 115 and 120 is real. exp requirements spike hard"}
      - {speaker: A, text: "im at skeles but the map competition is brutal"}
      - {speaker: B, text: "try going off peak hours. like really late or early morning"}
      - {speaker: A, text: "maybe ill set an alarm for like 6am that sounds insane but"}
      - {speaker: B, text: "ive done it. no shame. empty maps at dawn are golden", emote: 2}

  guild_boss_run_planning:
    participants: 4
    lines:
      - {speaker: A, text: "ok guild zakum saturday 7pm. who can make it"}
      - {speaker: B, text: "im there. need to pot up beforehand"}
      - {speaker: C, text: "i have work until 6 but ill be on by 7:30 at the latest"}
      - {speaker: D, text: "im free. do we have a bishop confirmed this time"}
      - {speaker: A, text: "taeyang said he can come so yes we have rez coverage"}
      - {speaker: B, text: "do we need to recruit anyone else or do we have 6"}
      - {speaker: C, text: "we should have 8 minimum for smooth runs ideally"}
      - {speaker: A, text: "ill post in recruitment chat. we need 2 more"}
      - {speaker: D, text: "make sure they have at least 100 def gear. last time was rough", emote: 5}

  losing_track_of_time:
    participants: 2
    lines:
      - {speaker: A, text: "bro i sat down to play for an hour and its now been 5"}
      - {speaker: B, text: "maple time runs on a different clock. its a known phenomenon"}
      - {speaker: A, text: "i genuinely thought it was like 9pm and its midnight"}
      - {speaker: B, text: "to be fair u were probably in a good flow state", emote: 3}
      - {speaker: A, text: "i was doing pq chains and just kept finding parties instantly"}
      - {speaker: B, text: "when parties are flowing u just dont want to stop"}
      - {speaker: A, text: "i have class tomorrow morning too. great decisions all around"}
      - {speaker: B, text: "been there. worth it though right"}
      - {speaker: A, text: "...yeah honestly it was worth it", emote: 2}

  training_spot_etiquette:
    participants: 3
    lines:
      - {speaker: A, text: "if someone is already training on a map do u cc or stay"}
      - {speaker: B, text: "depends on the map size. big map u can share, small map cc"}
      - {speaker: C, text: "i always ask first. hey is this map taken kind of thing"}
      - {speaker: A, text: "most people are chill if u ask. its the ones who just push in without asking"}
      - {speaker: B, text: "yeah that is annoying. at least acknowledge the other person"}
      - {speaker: C, text: "ive had people just start training next to me without a single word", emote: 6}
      - {speaker: A, text: "and then u have to be the one to bring it up which feels awkward"}
      - {speaker: B, text: "the social contract of training maps is real and needs to be respected"}

  mage_skill_rotation:
    participants: 2
    lines:
      - {speaker: A, text: "whats ur rotation for fire poison mage bossing"}
      - {speaker: B, text: "basically poison mist then meteor into element amplification when it procs"}
      - {speaker: A, text: "do u weave any regular attacks in or just wait for mist tick"}
      - {speaker: B, text: "i throw fire arrow in the gaps. keeps damage rolling while mist does its thing"}
      - {speaker: A, text: "how important is slow for bossing vs training spots"}
      - {speaker: B, text: "not super useful on bosses since most are immune. big for regular training"}
      - {speaker: A, text: "makes sense. fp feels complex but satisfying when it clicks"}
      - {speaker: B, text: "its one of the more active playstyles for sure. never boring", emote: 2}

  henesys_market_gossip:
    participants: 3
    lines:
      - {speaker: A, text: "someone in henesys is selling ilbis for half the going rate"}
      - {speaker: B, text: "theyre probably fakes or they need mesos fast"}
      - {speaker: C, text: "i saw that. the stats look legit to me"}
      - {speaker: A, text: "might just be someone clearing their bank. happens sometimes"}
      - {speaker: B, text: "or a merch making it look cheap to flip it later somewhere else"}
      - {speaker: C, text: "wow never thought of that angle. sneaky", emote: 6}
      - {speaker: A, text: "some people treat fm like a whole business strategy"}
      - {speaker: B, text: "and they make way more mesos than anyone grinding ever will lol"}

  slow_leveling_acceptance:
    participants: 2
    lines:
      - {speaker: A, text: "ive been level 73 for two weeks and i feel no shame about it"}
      - {speaker: B, text: "good mindset honestly. this game is a marathon"}
      - {speaker: A, text: "i just play when i feel like it. no rush to get anywhere specific"}
      - {speaker: B, text: "i wish i could do that. i get too fixated on the level number"}
      - {speaker: A, text: "it helps when ur just enjoying the journey instead of chasing the destination"}
      - {speaker: B, text: "very wise. are u secretly a philosopher or just lazy lol"}
      - {speaker: A, text: "a little of both maybe", emote: 3}
      - {speaker: B, text: "respect. ill try to chill out about my levels after this conversation"}

  warrior_weapon_debate:
    participants: 2
    lines:
      - {speaker: A, text: "polearm or spear for drk endgame. which is better"}
      - {speaker: B, text: "polearm hits more targets which is great for training but spear has higher single target"}
      - {speaker: A, text: "for zakum specifically im thinking spear for the arms"}
      - {speaker: B, text: "yeah spear makes more sense for boss focused builds"}
      - {speaker: A, text: "whats the attack speed difference though. does it matter a lot"}
      - {speaker: B, text: "with booster active its pretty close. polearm edges it slightly for aoe"}
      - {speaker: A, text: "ugh. why cant it just be simple"}
      - {speaker: B, text: "warriors always have this debate. just pick what feels good to use", emote: 2}

  drop_rate_conspiracy:
    participants: 2
    lines:
      - {speaker: A, text: "i swear my drop rate is worse when i have a killing streak going"}
      - {speaker: B, text: "like the game punishes u for doing too well"}
      - {speaker: A, text: "exactly. kill 500 in a row and u get nothing. kill 3 and rare drop"}
      - {speaker: B, text: "thats literally random chance working against ur expectations lol"}
      - {speaker: A, text: "i KNOW that but it doesnt feel random"}
      - {speaker: B, text: "thats ur brain pattern matching where there is no pattern", emote: 3}
      - {speaker: A, text: "my brain is wrong but its so convinced"}
      - {speaker: B, text: "classic maple experience. the rng hits different when ur invested"}

  maple_anniversary_memories:
    participants: 3
    lines:
      - {speaker: A, text: "the anniversary events back in the day were so good"}
      - {speaker: B, text: "the cake monster maps!! those were so chaotic and fun"}
      - {speaker: C, text: "everyone farming anniversary coins to get the event rings"}
      - {speaker: A, text: "and the free items they handed out. felt like a party"}
      - {speaker: B, text: "the anniversary hats were rare and ppl would show them off forever after"}
      - {speaker: C, text: "i still have my first anniversary hat on my mule somewhere"}
      - {speaker: A, text: "those events made u feel like the whole server was celebrating together", emote: 2}
      - {speaker: B, text: "maple knew how to do community events right back then"}

  party_finding_struggle:
    participants: 2
    lines:
      - {speaker: A, text: "been looking for a pq party for 25 minutes. nobody is recruiting"}
      - {speaker: B, text: "which pq"}
      - {speaker: A, text: "kerning pq. there are ppl waiting but no one wants to lead"}
      - {speaker: B, text: "classic. everyone wants to join but nobody wants to organize"}
      - {speaker: A, text: "i would lead but i dont know all the puzzle solutions yet"}
      - {speaker: B, text: "theres a guide in the forums. takes 5 minutes to learn the basics"}
      - {speaker: A, text: "maybe ill just do it. how hard can it be"}
      - {speaker: B, text: "youll do great. people are usually patient if u just say its ur first time leading", emote: 2}

  potion_expense_complaining:
    participants: 3
    lines:
      - {speaker: A, text: "i spent 2 million mesos on pots last week. two million"}
      - {speaker: B, text: "what level are u. that seems like a lot"}
      - {speaker: A, text: "im 130 and skeles just eats pots like crazy"}
      - {speaker: C, text: "have u tried using power elixirs over red pots. more efficient per meso sometimes"}
      - {speaker: A, text: "they cost more upfront but last longer i guess"}
      - {speaker: B, text: "the real fix is getting a bishop friend lol. hs plus heal changes everything"}
      - {speaker: C, text: "i started grinding with a bishop buddy and my pot costs dropped by like half"}
      - {speaker: A, text: "where do i acquire a bishop friend on demand", emote: 6}
      - {speaker: B, text: "guild recruitment. always looking for bishops"}

  guild_recruitment_pitch:
    participants: 2
    lines:
      - {speaker: A, text: "hey want to join a guild. we're pretty active"}
      - {speaker: B, text: "what kind of guild is it"}
      - {speaker: A, text: "casual but we do boss runs twice a week. 20 members"}
      - {speaker: B, text: "any level requirements"}
      - {speaker: A, text: "just gotta be past 2nd job. we dont care about level too much"}
      - {speaker: B, text: "whats the vibe. sweaty or just for fun"}
      - {speaker: A, text: "mostly for fun. we joke around in guild chat a lot"}
      - {speaker: B, text: "ok that sounds good actually. how do i join", emote: 2}
      - {speaker: A, text: "ill send u an invite right now. welcome aboard"}

  job_advance_celebration:
    participants: 3
    lines:
      - {speaker: A, text: "GUYS I JUST DID MY 3RD JOB ADVANCE", emote: 12}
      - {speaker: B, text: "LETS GOOOO. what did u go"}
      - {speaker: A, text: "dark knight baby. beholder is now mine"}
      - {speaker: C, text: "ohh dark knight is so cool. congrats for real"}
      - {speaker: A, text: "the quest was a little annoying but so worth it"}
      - {speaker: B, text: "how does beholder feel to use"}
      - {speaker: A, text: "amazing. like having a little buddy following me around buffing me"}
      - {speaker: C, text: "beholder sacrifice is going to save ur life in boss fights trust me", emote: 2}
      - {speaker: A, text: "this is the best day ive had in maple in months"}

  losing_a_good_scroll:
    participants: 2
    lines:
      - {speaker: A, text: "i just failed a 60% scroll on my bathrobe and i want to stop playing"}
      - {speaker: B, text: "oh man. what was on it already"}
      - {speaker: A, text: "it already had 2 60% passes on it. this was supposed to be the hat trick"}
      - {speaker: B, text: "and it failed on the third one. the cruel irony of that"}
      - {speaker: A, text: "i knew i should have stopped at 2 passes. known good item vs unknown greed"}
      - {speaker: B, text: "2 pass bathrobe is still a solid item though. dont throw it away", emote: 4}
      - {speaker: A, text: "i know. im just mourning what could have been"}
      - {speaker: B, text: "give it 10 minutes. ull feel better. scroll grief is temporary"}

  unexpected_pk_encounter:
    participants: 2
    lines:
      - {speaker: A, text: "someone just tried to ks me at zombie mushrooms and then called me a noob"}
      - {speaker: B, text: "lol classic. what did u do"}
      - {speaker: A, text: "i out-dps'd them and took the whole map and they rage quit"}
      - {speaker: B, text: "justice. that is the correct response to being ks'd"}
      - {speaker: A, text: "they came back with a friend and tried to pincer me from both sides"}
      - {speaker: B, text: "they really organized a whole retaliation for zombie mushrooms?", emote: 6}
      - {speaker: A, text: "dead serious. i just went to a different map at that point"}
      - {speaker: B, text: "sometimes the map isnt worth the drama lol"}

  old_friend_reunion:
    participants: 3
    lines:
      - {speaker: A, text: "wait. is that mikiryu? bro where have u been"}
      - {speaker: B, text: "OH WOAH. i havent seen u since like last year"}
      - {speaker: A, text: "i literally thought u quit for good"}
