# TrainingBot dialogue — roaming grinder bot. Ambient flavor, not quest text.
# Nodes delivered via the context path (executeBotContextDialogue); context tokens:
#   self:   {MAP} {REGION} {MOB} {DROP} {LEVEL}
#   player: {PLAYER_NAME} {PLAYER_JOB} {PLAYER_WEAPON} {PLAYER_GEAR} {PLAYER_PET} {PLAYER_GUILD}
# Every token-bearing node also carries plain fallback lines (engine re-rolls to a plain line
# when a token can't resolve). Node-level `emote` is a random mood palette decoupled from the
# picked line; per-line {line:, emote:} tags pin a line's emotion.
#
# Per-job signature overlays live under sibling keys TrainingBot_Warrior/_Mage/_Thief/_Bowman
# (the §7 recipe). NOTE: the handler does not yet merge these by job suffix — they are authored
# data-ready; wiring (look up TrainingBot_<job>.Signature alongside the base pool) is still TODO.

