# =============================================================================
# NX Equipment Pool - Bot Cosmetic Decoration
# =============================================================================
# Curated list of NX (cash) cosmetic equips applied on top of regular gear.
# No level filter - NX has no reqLevel.
#
# Entry formats:
#   Shorthand:  - 1002001
#   Explicit:   - { id: 1003797, gender: female }
#
# Gender resolution (in order of precedence):
#   1. Explicit `gender` field on the entry (male|female|unisex).
#   2. For BODY-slot categories only (caps / tops / bottoms / overalls /
#      shoes / gloves / capes) gender is derived from the 4th digit of the
#      item ID (0 = male, 1 = female, 2 = unisex) - same convention as
#      GenericEquipPool.
#   3. Otherwise (weapons, earrings, face, eye, rings) default is unisex.
#
# Add items by appending to the appropriate category. Curate at will.
# =============================================================================

