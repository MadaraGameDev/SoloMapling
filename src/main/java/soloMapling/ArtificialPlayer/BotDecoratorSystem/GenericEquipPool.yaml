# =============================================================================
# Generic Equipment Pool - Quick Bot Decoration
# =============================================================================
# Flat curated list of CLASSLESS / generic equips for fast bot decoration.
# Each item's minimum level is read from WZ (reqLevel) at load time and cached.
#
# Runtime pick rules (GenericEquipPool.getRandom):
#   1. Hard filter: item.reqLevel must be <= bot.level  (never over-level).
#   2. Weighted pick: items closer to bot.level are more likely.
#      Items well below bot.level still have a small chance (fashion picks).
#
# To add items: just append the item ID to the appropriate category.
# =============================================================================

