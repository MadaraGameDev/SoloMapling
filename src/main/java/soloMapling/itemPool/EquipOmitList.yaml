# =============================================================================
# Equip Omit List - items bots must never auto-equip at spawn
# =============================================================================
# These are valid, equippable WZ items (correct reqLevel / reqJob / gender), so
# the range-based selection in getRandomEquip and GenericEquipPool would pick
# them like any other gear - but they look terrible on a bot. The classic case
# is the "flag" items: decorative flag poles equipped as weapons (a bot
# "attacks" by waving a flag), plus a few national-flag cosmetics.
#
# How it works (see EquipOmitList.java):
#   - Both spawn-equip paths (full decoration via getRandomEquip, and the fast
#     QuickEquip path via GenericEquipPool) skip these ids and re-roll a
#     different item of the SAME slot, so the bot just gets something else.
#   - This does NOT touch the NX cosmetic overlay (BotDecorateNX) or Free Market
#     shop inventory generation - only the base equips a bot wears at spawn.
#
# To add/remove an item: edit the `ids` list below (inline "# name" comments are
# allowed and ignored by the parser). Set `enabled: false` to switch the whole
# list off and let bots wear everything again. The optional `ranges` block omits
# a contiguous id block at once.
#
# Item ids were pulled from wz/String.wz/Eqp.img.xml by name. Camouflage gear
# (Camouflaged Helmet/Uniform/Pants) matched a "flag" substring search but is
# real military gear that looks fine, so it is intentionally NOT listed here.
# =============================================================================

enabled: true

